env:
  DOCKER_IMAGE_NAME_DIRECTUS: "${{ secrets.DOCKERHUB_USERNAME }}/seliger-kamen-directus:latest"
  DOCKER_IMAGE_NAME_FRONTEND: "${{ secrets.DOCKERHUB_USERNAME }}/seliger-kamen-frontend:latest"

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push directus
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/production/directus.Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME_DIRECTUS }}
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/production/frontend.Dockerfile
          push: true
          no-cache: true
          tags: ${{ env.DOCKER_IMAGE_NAME_FRONTEND }}
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Copy caddyfile
        run: |
          scp -o StrictHostKeyChecking=no docker/production/configs/Caddyfile ${{ secrets.SSH_USER}}@${{secrets.SSH_HOST}}:Caddyfile
      - name: Copy docker-compose.yml
        run: |
          scp -o StrictHostKeyChecking=no docker/production/docker-compose.yaml ${{ secrets.SSH_USER}}@${{secrets.SSH_HOST}}:docker-compose.yml
      - name: Pull application
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "docker system prune -a -f && docker compose pull && exit"
      - name: Start application
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} ADMIN_SECRET=${{ secrets.ADMIN_SECRET }} docker compose up -d --force-recreate && exit"